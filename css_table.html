<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Layout Example</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 40px;
  }

  /* Table styling */
  table {
    border-collapse: collapse;
  }

  th, td {
    border: 2px solid black;
    padding: 12px 25px;
    text-align: center;
  }

  th {
    background-color: #777;
    color: white;
    font-weight: bold;
  }

  /* Alternating colors */
  tr:nth-child(2),
  tr:nth-child(4) {
    background-color: yellow;
  }

  tr:nth-child(3) {
    background-color: #ddd;
  }

  /* Fixed div */
  .fixed-box {
    position: fixed;
    top: 40px;
    right: 40px;
    border: 4px solid green;
    padding: 15px;
    width: 180px;
    background-color: white;
    font-size: 16px;
  }
</style>
</head>

<body>

<table>
  <tr>
    <th>Firstname</th>
    <th>Lastname</th>
  </tr>
  <tr>
    <td>1</td>
    <td>1</td>
  </tr>
  <tr>
    <td>2</td>
    <td>2</td>
  </tr>
  <tr>
    <td>3</td>
    <td>3</td>
  </tr>
</table>

<div class="fixed-box">
  This div element has position: fixed;
</div>

</body>
</html>
